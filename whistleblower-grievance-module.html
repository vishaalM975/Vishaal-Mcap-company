<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whistleblower &amp; Grievance — Module 58</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#12182B;
  --ink-2:#1B2440;
  --paper:#EAEDF3;
  --card:#FFFFFF;
  --line:#D7DBE3;
  --text:#1A2233;
  --muted:#5B6478;
  --seal:#7A1F2B;
  --seal-tint:#F3E3E1;
  --teal:#1F6F6B;
  --teal-tint:#DEEDEB;
  --amber:#B8862E;
  --amber-tint:#F6ECD8;
  --good:#2E7D5B;
  --good-tint:#E1EFE7;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  background:var(--paper);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:14px;
  display:flex;
  min-height:100vh;
}
h1,h2,h3,.display{font-family:'Fraunces',serif;}
.mono{font-family:'IBM Plex Mono',monospace;}

/* ---------- SIDEBAR ---------- */
#sidebar{
  width:268px;
  min-width:268px;
  background:var(--ink);
  color:#C9CFDD;
  height:100vh;
  position:sticky;
  top:0;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}
.brand{
  padding:22px 20px 16px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.brand .eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:.14em;
  color:var(--seal);
  background:rgba(122,31,43,0.18);
  display:inline-block;
  padding:2px 7px;
  border-radius:2px;
  margin-bottom:8px;
}
.brand h1{
  font-size:19px;
  font-weight:600;
  color:#fff;
  margin:0;
  line-height:1.25;
}
.brand p{
  font-size:11.5px;
  color:#8B93A7;
  margin:6px 0 0 0;
  line-height:1.4;
}
.nav-group{padding:14px 10px;}
.nav-group-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:#6F7896;
  padding:8px 12px 6px 12px;
}
.nav-item{
  display:flex;
  align-items:baseline;
  gap:10px;
  width:100%;
  text-align:left;
  background:none;
  border:none;
  color:#C9CFDD;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
  font-size:13px;
  font-family:inherit;
  line-height:1.35;
}
.nav-item .n{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  color:#6F7896;
  min-width:16px;
}
.nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
.nav-item.active{background:var(--seal);color:#fff;}
.nav-item.active .n{color:rgba(255,255,255,0.75);}

/* ---------- MAIN ---------- */
#main{flex:1;min-width:0;display:flex;flex-direction:column;}
#topbar{
  background:var(--card);
  border-bottom:1px solid var(--line);
  padding:16px 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
#topbar .path{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  color:var(--muted);
  letter-spacing:.04em;
}
#topbar h2{font-size:21px;margin:2px 0 0 0;font-weight:600;}
#topbar .purpose{font-size:12.5px;color:var(--muted);margin-top:2px;}
.conf-pill{
  display:flex;align-items:center;gap:7px;
  border:1px solid var(--seal);
  color:var(--seal);
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px;
  letter-spacing:.08em;
  padding:6px 12px;
  border-radius:20px;
  white-space:nowrap;
}
.conf-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--seal);}

#content{padding:28px 32px 60px 32px;}

/* ---------- SHARED COMPONENTS ---------- */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{
  background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:16px 18px;
}
.stat-card .label{font-size:11px;color:var(--muted);letter-spacing:.03em;text-transform:uppercase;}
.stat-card .value{font-family:'Fraunces',serif;font-size:28px;font-weight:600;margin-top:4px;}
.stat-card .sub{font-size:11.5px;color:var(--muted);margin-top:3px;}
.stat-card.accent-seal{border-color:var(--seal);background:var(--seal-tint);}
.stat-card.accent-teal{border-color:var(--teal);background:var(--teal-tint);}
.stat-card.accent-amber{border-color:var(--amber);background:var(--amber-tint);}
.stat-card.accent-good{border-color:var(--good);background:var(--good-tint);}

.panel{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px 22px;margin-bottom:20px;}
.panel h3{font-size:15px;margin:0 0 14px 0;font-weight:600;display:flex;align-items:center;gap:8px;}
.panel h3 .k{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);font-weight:400;}
.panel-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media (max-width:980px){.panel-grid{grid-template-columns:1fr;}}

table{width:100%;border-collapse:collapse;font-size:12.8px;}
th{
  text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;
  color:var(--muted);text-transform:uppercase;letter-spacing:.04em;
  padding:8px 10px;border-bottom:1px solid var(--line);font-weight:500;
}
td{padding:9px 10px;border-bottom:1px solid #EEF0F4;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#FAFBFC;}

/* seal badge — signature element */
.seal{
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;
  font-size:9.5px;letter-spacing:.09em;font-weight:500;
  border:1.5px solid currentColor;border-radius:50%;
  width:58px;height:58px;text-align:center;line-height:1.15;
  transform:rotate(-6deg);
  padding:4px;
  flex-shrink:0;
}
.seal.small{width:auto;height:auto;border-radius:20px;padding:3px 10px;transform:none;}
.seal.open{color:var(--amber);}
.seal.investigating{color:var(--teal);}
.seal.closed{color:var(--good);}
.seal.escalated{color:var(--seal);}

.badge{
  display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;
  font-family:'IBM Plex Mono',monospace;letter-spacing:.02em;
}
.badge.b-amber{background:var(--amber-tint);color:var(--amber);}
.badge.b-teal{background:var(--teal-tint);color:var(--teal);}
.badge.b-good{background:var(--good-tint);color:var(--good);}
.badge.b-seal{background:var(--seal-tint);color:var(--seal);}
.badge.b-muted{background:#EEF0F4;color:var(--muted);}

.bar-track{background:#EEF0F4;border-radius:6px;height:8px;width:100%;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;}

.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.pill{border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--muted);background:#fff;}
.pill.active{border-color:var(--ink);color:var(--ink);font-weight:600;}

.timeline{border-left:2px solid var(--line);margin-left:8px;padding-left:20px;}
.tl-item{position:relative;padding-bottom:22px;}
.tl-item:last-child{padding-bottom:0;}
.tl-item::before{
  content:'';position:absolute;left:-25.5px;top:2px;width:11px;height:11px;
  border-radius:50%;background:var(--card);border:2.5px solid var(--teal);
}
.tl-item.done::before{background:var(--good);border-color:var(--good);}
.tl-item.pending::before{background:var(--card);border-color:var(--line);}
.tl-time{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted);}
.tl-title{font-weight:600;font-size:13px;margin:2px 0 3px 0;}
.tl-desc{font-size:12.5px;color:var(--muted);}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 18px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field.full{grid-column:1/-1;}
.field label{font-size:11.5px;color:var(--muted);font-weight:500;}
.field input,.field select,.field textarea{
  border:1px solid var(--line);border-radius:7px;padding:9px 11px;font-size:13px;
  font-family:inherit;background:#FCFCFD;color:var(--text);
}
.field textarea{resize:vertical;min-height:70px;}
.btn{
  border:none;border-radius:7px;padding:10px 18px;font-size:13px;font-weight:600;
  cursor:pointer;font-family:inherit;
}
.btn-seal{background:var(--seal);color:#fff;}
.btn-ghost{background:none;border:1px solid var(--line);color:var(--text);}

.note{font-size:12px;color:var(--muted);line-height:1.55;margin-top:2px;}
.kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #EEF0F4;font-size:12.8px;}
.kv:last-child{border-bottom:none;}
.kv .k{color:var(--muted);}

.chip-list{display:flex;flex-wrap:wrap;gap:8px;}
.chip{background:#EEF0F4;border-radius:6px;padding:6px 10px;font-size:12px;display:flex;align-items:center;gap:6px;}

.hbar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.hbar-row .lab{width:150px;font-size:12.5px;color:var(--text);flex-shrink:0;}
.hbar-row .val{width:34px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--muted);text-align:right;}
</style>
</head>
<body>

<div id="sidebar">
  <div class="brand">
    <span class="eyebrow">MODULE 58 · GOVERNANCE &amp; AUDIT MGMT</span>
    <h1>Whistleblower &amp; Grievance</h1>
    <p>Confidential ethics &amp; grievance channel — intake through closure, feeding board-level governance reporting.</p>
  </div>
  <div id="nav-container"></div>
</div>

<div id="main">
  <div id="topbar">
    <div>
      <div class="path" id="topbath">SIGNATURE · CASE OPERATIONS</div>
      <h2 id="topttl">Anonymous Intake Channel</h2>
      <div class="purpose" id="toppurp">Multi-mode confidential reporting</div>
    </div>
    <div class="conf-pill"><span class="dot"></span>CONFIDENTIAL CHANNEL</div>
  </div>
  <div id="content"></div>
</div>

<script>
const PAGES = [
  {n:1,group:"Case Operations",type:"Signature",title:"Anonymous Intake Channel",purpose:"Multi-mode confidential reporting",render:"pIntake"},
  {n:2,group:"Case Operations",type:"Signature",title:"Case Triage & Categorisation",purpose:"Classify and prioritise",render:"pTriage"},
  {n:3,group:"Case Operations",type:"Signature",title:"Conflict-Free Assignment",purpose:"Independent handler allocation",render:"pAssignment"},
  {n:4,group:"Case Operations",type:"Signature",title:"Investigation Tracking",purpose:"Manage each complaint to closure",render:"pInvestigation"},
  {n:5,group:"Case Operations",type:"Signature",title:"Whistleblower Protection",purpose:"Anti-retaliation safeguards",render:"pProtection"},
  {n:6,group:"Case Operations",type:"Signature",title:"SLA & Ageing Monitor",purpose:"Timeliness of resolution",render:"pSLA"},
  {n:7,group:"Case Operations",type:"Signature",title:"Substantiation Outcome",purpose:"Founded/unfounded disposition",render:"pOutcome"},
  {n:8,group:"Case Operations",type:"Signature",title:"Disciplinary-Action Linkage",purpose:"Consequence management",render:"pDiscipline"},
  {n:9,group:"Insight & Governance",type:"Signature",title:"Trend & Hotspot Analytics",purpose:"Recurring issue areas",render:"pTrends"},
  {n:10,group:"Insight & Governance",type:"Signature",title:"Committee / Board Reporting",purpose:"Governance-level summaries",render:"pBoard"},
  {n:11,group:"Insight & Governance",type:"Signature",title:"Confidentiality Controls",purpose:"Access-restricted case data",render:"pConfidentiality"},
  {n:12,group:"Insight & Governance",type:"Signature",title:"Feedback to Complainant",purpose:"Closure communication",render:"pFeedback"},
  {n:13,group:"Insight & Governance",type:"Signature",title:"Repeat-Complaint Linkage",purpose:"Connect related cases",render:"pRepeat"},
  {n:14,group:"Insight & Governance",type:"Signature",title:"POSH / HR Grievance Split",purpose:"Route to correct forum",render:"pSplit"},
  {n:15,group:"Insight & Governance",type:"Signature",title:"Ethics-Culture Survey",purpose:"Speak-up climate measurement",render:"pSurvey"},
  {n:16,group:"Audit Framework",type:"Shell",title:"Module Dashboard & KPIs",purpose:"Live risk score, open exceptions, coverage % and trend",render:"pDashboard"},
  {n:17,group:"Audit Framework",type:"Shell",title:"Scope & Audit Universe",purpose:"Define the auditable units/entities/processes in scope",render:"pScope"},
  {n:18,group:"Audit Framework",type:"Shell",title:"Risk & Control Matrix (RCM)",purpose:"Catalogue risks, controls, assertions and control owners",render:"pRCM"},
  {n:19,group:"Audit Framework",type:"Shell",title:"Test & Analytics Rule Library",purpose:"Configure automated red-flag rules, thresholds and CAAT scripts",render:"pRules"},
  {n:20,group:"Audit Framework",type:"Shell",title:"Data Source & Connector Setup",purpose:"Map ERP tables/APIs/uploads feeding this module's analytics",render:"pConnectors"},
  {n:21,group:"Audit Framework",type:"Shell",title:"Sampling & Population Builder",purpose:"Draw statistical or judgemental samples from the population",render:"pSampling"},
  {n:22,group:"Audit Framework",type:"Shell",title:"Exception & Red-Flag Queue",purpose:"Triage system-generated exceptions with disposition",render:"pExceptions"},
  {n:23,group:"Audit Framework",type:"Shell",title:"Working Papers & Evidence",purpose:"Attach evidence, tick-marks, screenshots and sign-off",render:"pWorkingPapers"},
  {n:24,group:"Audit Framework",type:"Shell",title:"Observation & Finding Log",purpose:"Raise, grade, and route findings for this domain",render:"pFindings"},
  {n:25,group:"Audit Framework",type:"Shell",title:"Remediation / Action Tracker",purpose:"Track CAPA items, owners, due dates and re-testing status",render:"pRemediation"},
];

/* ---------------- MOCK DATA ---------------- */
const CASES = [
  {id:"WB-2026-0114",title:"Vendor kickback allegation — Procurement (West Region)",cat:"Fraud & Corruption",channel:"Web form (anon)",status:"investigating",risk:"High",days:22,sla:30,handler:"E. Fontaine (Ext. Counsel)"},
  {id:"WB-2026-0113",title:"Falsified inspection records — Plant 4 QA",cat:"Compliance",channel:"Hotline call",status:"open",risk:"High",days:4,sla:30,handler:"Unassigned"},
  {id:"WB-2026-0111",title:"Manager favoritism in overtime allocation",cat:"HR Grievance",channel:"Email",status:"closed",risk:"Low",days:19,sla:20,handler:"S. Nair (HRBP)"},
  {id:"WB-2026-0109",title:"Alleged workplace harassment — Sales team lead",cat:"POSH",risk:"High",channel:"In-person",status:"escalated",days:11,sla:15,handler:"POSH Internal Committee"},
  {id:"WB-2026-0107",title:"Data privacy breach — customer records exported",cat:"IT & Data",channel:"Mobile app (anon)",status:"investigating",risk:"Medium",days:15,sla:30,handler:"R. Kapoor (Internal Audit)"},
  {id:"WB-2026-0104",title:"Expense report irregularities — regional sales",cat:"Fraud & Corruption",channel:"Web form (anon)",status:"closed",risk:"Medium",days:27,sla:30,handler:"E. Fontaine (Ext. Counsel)"},
];

function sealClass(status){return {open:"open",investigating:"investigating",closed:"closed",escalated:"escalated"}[status]||"open";}
function sealLabel(status){return {open:"OPEN",investigating:"UNDER\nREVIEW",closed:"CLOSED\n& SEALED",escalated:"ESCALATED"}[status]||status.toUpperCase();}

/* ---------------- SHARED RENDER HELPERS ---------------- */
function h(strings,...vals){return strings.reduce((acc,s,i)=>acc+s+(vals[i]!==undefined?vals[i]:""),"");}

function statGrid(items){
  return `<div class="stat-grid">${items.map(it=>`
    <div class="stat-card ${it.accent?`accent-${it.accent}`:""}">
      <div class="label">${it.label}</div>
      <div class="value">${it.value}</div>
      ${it.sub?`<div class="sub">${it.sub}</div>`:""}
    </div>`).join("")}</div>`;
}

function panel(title,key,inner){
  return `<div class="panel"><h3>${title} ${key?`<span class="k">${key}</span>`:""}</h3>${inner}</div>`;
}

function caseTable(rows,cols){
  cols = cols || ["id","title","cat","status","days","handler"];
  const headerMap = {id:"Case ID",title:"Summary",cat:"Category",status:"Status",days:"Days Open",handler:"Handler",risk:"Risk",channel:"Channel",sla:"SLA (days)"};
  return `<table><thead><tr>${cols.map(c=>`<th>${headerMap[c]}</th>`).join("")}</tr></thead><tbody>
    ${rows.map(r=>`<tr>${cols.map(c=>{
      if(c==="id") return `<td class="mono">${r.id}</td>`;
      if(c==="status") return `<td><span class="seal small ${sealClass(r.status)}">${r.status[0].toUpperCase()+r.status.slice(1)}</span></td>`;
      if(c==="risk") return `<td><span class="badge ${r.risk==="High"?"b-seal":r.risk==="Medium"?"b-amber":"b-good"}">${r.risk}</span></td>`;
      return `<td>${r[c]}</td>`;
    }).join("")}</tr>`).join("")}
  </tbody></table>`;
}

function setTop(p){
  document.getElementById("topbath").textContent = `${p.type.toUpperCase()} · ${p.group.toUpperCase()}`;
  document.getElementById("topttl").textContent = p.title;
  document.getElementById("toppurp").textContent = p.purpose;
}

function buildNav(){
  const groups = {};
  PAGES.forEach(p=>{ (groups[p.group]=groups[p.group]||[]).push(p); });
  let out = "";
  Object.keys(groups).forEach(g=>{
    out += `<div class="nav-group"><div class="nav-group-label">${g}</div>`;
    groups[g].forEach(p=>{
      out += `<button class="nav-item" data-n="${p.n}" onclick="go(${p.n})"><span class="n">${String(p.n).padStart(2,"0")}</span><span>${p.title}</span></button>`;
    });
    out += `</div>`;
  });
  document.getElementById("nav-container").innerHTML = out;
}

function go(n){
  const p = PAGES.find(x=>x.n===n);
  setTop(p);
  document.querySelectorAll(".nav-item").forEach(el=>el.classList.toggle("active",Number(el.dataset.n)===n));
  document.getElementById("content").innerHTML = window[p.render]();
  window.scrollTo(0,0);
}

/* ================= SIGNATURE PAGES ================= */

function pIntake(){
  return `
  ${statGrid([
    {label:"Reports this month",value:"18",sub:"+4 vs prior month",accent:"teal"},
    {label:"Anonymous submissions",value:"72%",sub:"of total intake"},
    {label:"Channels live",value:"5",sub:"web · hotline · app · email · in-person"},
    {label:"Avg. intake-to-triage",value:"6.4 hrs",accent:"good"},
  ])}
  <div class="panel-grid">
    <div class="panel"><h3>File a report <span class="k">ANONYMOUS BY DEFAULT</span></h3>
      <div class="form-grid">
        <div class="field full"><label>Nature of concern</label>
          <select><option>Fraud & Corruption</option><option>Compliance / Regulatory</option><option>POSH / Harassment</option><option>HR Grievance</option><option>IT & Data</option><option>Health & Safety</option></select>
        </div>
        <div class="field"><label>Entity / location</label><input placeholder="e.g. Plant 4, West Region"></div>
        <div class="field"><label>When did this occur</label><input type="text" placeholder="e.g. Ongoing, since March"></div>
        <div class="field full"><label>Description</label><textarea placeholder="Describe what you observed. You do not need to identify yourself."></textarea></div>
        <div class="field full"><label>Supporting evidence</label>
          <div class="chip-list"><span class="chip">📎 invoice_scan.pdf</span><span class="chip">📎 email_thread.eml</span><span class="chip">+ Add file</span></div>
        </div>
        <div class="field"><label>Identity</label><select><option>Remain fully anonymous</option><option>Confidential — reveal to handler only</option><option>Identified</option></select></div>
        <div class="field"><label>Preferred contact for follow-up</label><input placeholder="Anonymous mailbox ID generated on submit"></div>
      </div>
      <div style="margin-top:16px;display:flex;gap:10px;"><button class="btn btn-seal">Submit report</button><button class="btn btn-ghost">Save draft</button></div>
      <p class="note">Every submission is encrypted at rest and routed only to conflict-checked handlers (see Confidentiality Controls). No IP address, device ID, or metadata is retained for anonymous submissions.</p>
    </div>
    <div class="panel"><h3>Intake channels</h3>
      <table><thead><tr><th>Channel</th><th>Availability</th><th>Volume (30d)</th></tr></thead><tbody>
      <tr><td>Web form</td><td><span class="badge b-good">Live</span></td><td>9</td></tr>
      <tr><td>Toll-free hotline (24×7)</td><td><span class="badge b-good">Live</span></td><td>4</td></tr>
      <tr><td>Mobile app</td><td><span class="badge b-good">Live</span></td><td>3</td></tr>
      <tr><td>Dedicated ethics mailbox</td><td><span class="badge b-good">Live</span></td><td>1</td></tr>
      <tr><td>In-person / ombudsperson</td><td><span class="badge b-good">Live</span></td><td>1</td></tr>
      </tbody></table>
      <p class="note" style="margin-top:12px;">A unique case reference and anonymous reply mailbox are issued instantly, so a reporter can check status or add information later without revealing identity.</p>
    </div>
  </div>`;
}

function pTriage(){
  const cols = {"New":["WB-2026-0113"],"Categorising":["WB-2026-0107"],"Prioritised":["WB-2026-0114","WB-2026-0109"],"Sent to assignment":["WB-2026-0104"]};
  const meta = Object.fromEntries(CASES.map(c=>[c.id,c]));
  return `
  ${statGrid([
    {label:"Awaiting triage",value:"3",accent:"amber"},
    {label:"Median triage time",value:"1.8 days"},
    {label:"High-risk this week",value:"2",accent:"seal"},
  ])}
  <div class="panel"><h3>Triage board</h3>
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;">
  ${Object.entries(cols).map(([lane,ids])=>`
    <div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;">${lane} · ${ids.length}</div>
