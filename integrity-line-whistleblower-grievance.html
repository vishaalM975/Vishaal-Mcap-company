<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrity Line — Whistleblower &amp; Grievance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --canvas:#F1F4F6;
  --panel:#FFFFFF;
  --ink:#122036;
  --ink-soft:#334158;
  --slate:#5B6B82;
  --line:#DEE4EA;
  --line-soft:#EAEEF2;
  --teal:#0F6E63;
  --teal-deep:#0B554C;
  --teal-tint:#E4F1EE;
  --amber:#B9761F;
  --amber-tint:#FBF0DF;
  --red:#AE2E23;
  --red-tint:#FBE9E7;
  --violet:#5B4E9C;
  --violet-tint:#EEECF7;
  --radius:10px;
  --shadow:0 1px 2px rgba(18,32,54,0.06), 0 8px 24px -12px rgba(18,32,54,0.12);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--canvas);
  color:var(--ink);
  font-family:'Inter',system-ui,sans-serif;
  font-size:14px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.serif{font-family:'Fraunces',serif;}

/* ===== Layout ===== */
.app{display:flex; min-height:100vh;}
.sidebar{
  width:272px; flex-shrink:0;
  background:var(--ink);
  color:#DCE3EC;
  display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh;
  overflow-y:auto;
}
.sidebar::-webkit-scrollbar{width:6px;}
.sidebar::-webkit-scrollbar-thumb{background:#2A3B58; border-radius:3px;}

.brand{
  padding:22px 20px 16px 20px;
  border-bottom:1px solid rgba(255,255,255,0.08);
}
.brand-mark{
  display:flex; align-items:center; gap:10px;
}
.brand-stamp{
  width:34px; height:34px; border:1.6px solid #6FA69C; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-family:'Fraunces',serif; font-weight:600; font-size:14px; color:#8FC4B9;
  transform:rotate(-8deg);
  flex-shrink:0;
}
.brand-name{font-family:'Fraunces',serif; font-weight:600; font-size:17px; color:#F3F6F4; letter-spacing:0.2px;}
.brand-sub{font-size:11px; color:#8493AC; margin-top:2px; letter-spacing:0.3px;}

.nav-scroll{padding:10px 10px 24px 10px; flex:1;}
.nav-group-label{
  font-size:10.5px; text-transform:uppercase; letter-spacing:1.2px;
  color:#6B7C99; padding:16px 10px 6px 10px; font-weight:600;
}
.nav-item{
  display:flex; align-items:center; gap:10px;
  padding:8px 10px; border-radius:8px; cursor:pointer;
  color:#B7C2D6; font-size:13.2px;
  margin-bottom:1px;
  border:1px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,0.05); color:#F1F4F8;}
.nav-item.active{background:rgba(111,166,156,0.14); color:#EFF7F5; border-color:rgba(111,166,156,0.3);}
.nav-num{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#5E7089;
  width:20px; flex-shrink:0;
}
.nav-item.active .nav-num{color:#8FC4B9;}
.nav-type-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.dot-signature{background:#8FC4B9;}
.dot-shell{background:#8492AF;}

.main{flex:1; min-width:0;}
.topbar{
  position:sticky; top:0; z-index:5;
  background:rgba(241,244,246,0.92); backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line);
  padding:16px 32px; display:flex; align-items:baseline; justify-content:space-between;
}
.topbar-title{font-family:'Fraunces',serif; font-weight:600; font-size:21px; color:var(--ink);}
.topbar-crumb{font-size:12px; color:var(--slate); margin-top:3px;}
.topbar-purpose{font-size:12.5px; color:var(--ink-soft); max-width:420px; text-align:right;}
.content{padding:26px 32px 60px 32px; max-width:1180px;}

/* ===== Common components ===== */
.stat-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:22px;}
.stat-card{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px 16px 14px 16px; box-shadow:var(--shadow);
}
.stat-num{font-family:'Fraunces',serif; font-size:28px; font-weight:600; color:var(--ink); line-height:1;}
.stat-label{font-size:11.5px; color:var(--slate); margin-top:6px; text-transform:uppercase; letter-spacing:0.5px;}
.stat-delta{font-size:11px; margin-top:8px; font-weight:600;}
.up-bad{color:var(--red);} .up-good{color:var(--teal-deep);} .flat{color:var(--slate);}

.panel{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:22px; overflow:hidden;}
.panel-head{padding:15px 18px; border-bottom:1px solid var(--line-soft); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
.panel-title{font-weight:600; font-size:14.5px; color:var(--ink);}
.panel-desc{font-size:12px; color:var(--slate); margin-top:2px;}
.panel-body{padding:18px;}

table{width:100%; border-collapse:collapse; font-size:13px;}
th{
  text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:0.5px;
  color:var(--slate); padding:9px 12px; border-bottom:1px solid var(--line); background:#FAFBFC;
  white-space:nowrap;
}
td{padding:10px 12px; border-bottom:1px solid var(--line-soft); vertical-align:top; color:var(--ink-soft);}
tr:last-child td{border-bottom:none;}
tbody tr:hover{background:#FAFBFD;}
td.id-cell{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--ink);}

.badge{
  display:inline-flex; align-items:center; gap:5px;
  padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600;
  white-space:nowrap; border:1px solid transparent;
}
.b-teal{background:var(--teal-tint); color:var(--teal-deep); border-color:#C7E2DC;}
.b-amber{background:var(--amber-tint); color:#8A5A16; border-color:#EAD3A6;}
.b-red{background:var(--red-tint); color:var(--red); border-color:#EFC7C1;}
.b-violet{background:var(--violet-tint); color:var(--violet); border-color:#D6D0EC;}
.b-gray{background:#EEF1F4; color:var(--slate); border-color:var(--line);}

.stamp{
  display:inline-block; padding:2px 10px; border:1.4px solid currentColor; border-radius:4px;
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; letter-spacing:0.6px; text-transform:uppercase;
  transform:rotate(-2deg); font-weight:600;
}

.btn{
  appearance:none; border:1px solid var(--ink); background:var(--ink); color:#fff;
  padding:8px 14px; border-radius:8px; font-size:12.5px; font-weight:600; cursor:pointer;
  font-family:inherit;
}
.btn:hover{background:#1D2E4A;}
.btn-ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
.btn-ghost:hover{background:#F3F5F7;}
.btn-teal{background:var(--teal); border-color:var(--teal);}
.btn-teal:hover{background:var(--teal-deep);}
.btn-sm{padding:5px 10px; font-size:11.5px; border-radius:6px;}

select, input[type=text], input[type=number], input[type=date], textarea{
  font-family:inherit; font-size:12.8px; color:var(--ink);
  border:1px solid var(--line); border-radius:7px; padding:7px 10px; background:#fff;
  width:100%;
}
select:focus, input:focus, textarea:focus{outline:2px solid #B9DCD5; outline-offset:0; border-color:var(--teal);}
label{font-size:11.5px; font-weight:600; color:var(--ink-soft); display:block; margin-bottom:4px;}
.field{margin-bottom:13px;}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:13px;}

.bar-track{width:100%; height:6px; border-radius:4px; background:#EAEEF2; overflow:hidden;}
.bar-fill{height:100%; border-radius:4px;}

.empty{padding:34px 18px; text-align:center; color:var(--slate); font-size:13px;}
.empty b{color:var(--ink-soft);}

.kanban{display:grid; grid-template-columns:repeat(5,1fr); gap:12px;}
.kcol{background:#F7F8FA; border:1px solid var(--line); border-radius:10px; padding:10px;}
.kcol-head{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--slate); margin-bottom:9px; display:flex; justify-content:space-between;}
.kcard{background:#fff; border:1px solid var(--line); border-radius:8px; padding:9px 10px; margin-bottom:8px; box-shadow:0 1px 2px rgba(18,32,54,0.05);}
.kcard-id{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--teal-deep); font-weight:600;}
.kcard-title{font-size:12px; margin-top:3px; color:var(--ink);}
.kcard-meta{font-size:10.5px; color:var(--slate); margin-top:6px;}

.timeline{position:relative; padding-left:20px;}
.timeline::before{content:'';position:absolute; left:5px; top:4px; bottom:4px; width:1.5px; background:var(--line);}
.tl-item{position:relative; padding-bottom:18px;}
.tl-dot{position:absolute; left:-20px; top:3px; width:9px; height:9px; border-radius:50%; background:var(--teal); border:2px solid #fff; box-shadow:0 0 0 1px var(--teal);}
.tl-when{font-size:10.5px; color:var(--slate); font-family:'IBM Plex Mono',monospace;}
.tl-what{font-size:12.8px; color:var(--ink-soft); margin-top:2px;}

.toast{
  position:fixed; bottom:22px; right:22px; background:var(--ink); color:#fff;
  padding:11px 18px; border-radius:8px; font-size:12.8px; box-shadow:var(--shadow);
  opacity:0; transform:translateY(8px); transition:all .25s ease; pointer-events:none; z-index:50;
}
.toast.show{opacity:1; transform:translateY(0);}

.modal-backdrop{position:fixed; inset:0; background:rgba(18,32,54,0.45); display:none; align-items:flex-start; justify-content:center; padding:6vh 20px; z-index:40; overflow-y:auto;}
.modal-backdrop.show{display:flex;}
.modal{background:#fff; border-radius:12px; width:100%; max-width:560px; box-shadow:0 24px 60px rgba(18,32,54,0.3); overflow:hidden;}
.modal-head{padding:16px 20px; border-bottom:1px solid var(--line-soft); display:flex; justify-content:space-between; align-items:center;}
.modal-title{font-weight:700; font-size:15px; font-family:'Fraunces',serif;}
.modal-body{padding:18px 20px; max-height:64vh; overflow-y:auto;}
.modal-foot{padding:14px 20px; border-top:1px solid var(--line-soft); display:flex; justify-content:flex-end; gap:8px;}
.x-close{cursor:pointer; color:var(--slate); font-size:18px; line-height:1; background:none; border:none;}

.pill-nav{display:flex; gap:6px; flex-wrap:wrap;}
.pill{padding:5px 11px; border-radius:20px; font-size:11.5px; border:1px solid var(--line); color:var(--slate); cursor:pointer; background:#fff;}
.pill.active{background:var(--ink); color:#fff; border-color:var(--ink);}

.foot-note{font-size:11px; color:#8493AC; margin-top:26px; text-align:center; padding-bottom:10px;}

@media (max-width:900px){
  .sidebar{position:fixed; left:-272px; z-index:30; transition:left .2s;}
  .sidebar.open{left:0;}
  .content{padding:20px 16px 50px;}
  .topbar{padding:14px 16px;}
  .form-grid{grid-template-columns:1fr;}
  .kanban{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-backdrop" id="modalBackdrop"><div class="modal" id="modal"></div></div>
<script>
/* =========================================================================

const PAGES = [

const CATEGORIES = ['Financial Fraud','Corruption / Bribery','Conflict of Interest','Data Privacy Breach','Workplace Harassment','Discrimination','H&S Violation','Procurement Irregularity','Code of Conduct','Retaliation'];
const DEPARTMENTS = ['Finance','Procurement','Sales & Marketing','Operations','Human Resources','IT & Security','Supply Chain','Legal & Compliance','Manufacturing'];
const ENTITIES = ['Corporate HQ','Plant — Chennai','Plant — Pune','APAC Regional Office','EMEA Regional Office','Shared Services Center','Distribution Hub — North'];

let SEQ = 1042;
function nextCaseId(){ SEQ++; return 'WB-2026-'+String(SEQ).padStart(4,'0'); }
function uid(prefix){ return prefix+'-'+Math.random().toString(36).slice(2,7).toUpperCase(); }
function fmtDate(d){ const dt=(d instanceof Date)?d:new Date(d); return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
function daysAgo(n){ const d=new Date(); d.setDate(d.getDate()-n); return d; }
function daysBetween(a,b){ return Math.round((b-a)/86400000); }

/* ---- Seed data: Cases (drives Intake, Triage, Assignment, Investigation, SLA, Substantiation, Disciplinary, Trends, Repeat, POSH) ---- */
const STAGES = ['Intake','Triage','Investigation','Review','Closed'];
const HANDLERS = ['A. Krishnan (Ethics Office)','S. Fernandes (Internal Audit)','R. Mehta (HR Compliance)','L. D\'Souza (Legal)','N. Iyer (Independent Counsel)'];

const CASES = [
  {id:'WB-2026-0871', channel:'Web Form', anon:true, category:'Financial Fraud', dept:'Finance', entity:'Corporate HQ', stage:'Investigation', severity:'Critical', handler:'S. Fernandes (Internal Audit)', opened:daysAgo(38), sla:30, outcome:null, retaliationRisk:'Medium', forum:'Ethics', desc:'Alleged manipulation of vendor invoices to inflate quarterly spend.', related:['WB-2026-0790']},
  {id:'WB-2026-0902', channel:'Hotline (Call)', anon:true, category:'Workplace Harassment', dept:'Sales & Marketing', entity:'APAC Regional Office', stage:'Review', severity:'High', handler:'R. Mehta (HR Compliance)', opened:daysAgo(24), sla:21, outcome:'Substantiated', retaliationRisk:'High', forum:'POSH Committee', desc:'Complaint of persistent inappropriate remarks by a reporting manager.', related:[]},
  {id:'WB-2026-0918', channel:'Mobile App', anon:false, category:'Conflict of Interest', dept:'Procurement', entity:'Plant — Chennai', stage:'Triage', severity:'Medium', handler:null, opened:daysAgo(6), sla:30, outcome:null, retaliationRisk:'Low', forum:null, desc:'Employee flags undisclosed family relationship with an approved vendor.', related:[]},
  {id:'WB-2026-0790', channel:'Email', anon:true, category:'Financial Fraud', dept:'Finance', entity:'Corporate HQ', stage:'Closed', severity:'Critical', handler:'S. Fernandes (Internal Audit)', opened:daysAgo(112), sla:30, outcome:'Substantiated', retaliationRisk:'Low', forum:'Ethics', desc:'Earlier-cycle report of duplicate payments to a shell vendor account.', related:['WB-2026-0871']},
  {id:'WB-2026-0925', channel:'Web Form', anon:true, category:'Data Privacy Breach', dept:'IT & Security', entity:'Shared Services Center', stage:'Investigation', severity:'High', handler:'L. D\'Souza (Legal)', opened:daysAgo(17), sla:21, outcome:null, retaliationRisk:'Low', forum:'Ethics', desc:'Customer PII allegedly exported to a personal drive by a contractor.', related:[]},
  {id:'WB-2026-0931', channel:'Walk-in', anon:false, category:'Discrimination', dept:'Human Resources', entity:'Corporate HQ', stage:'Intake', severity:'Medium', handler:null, opened:daysAgo(2), sla:30, outcome:null, retaliationRisk:'Low', forum:null, desc:'Concern raised over promotion criteria applied inconsistently across a team.', related:[]},

  {id:'WB-2026-0888', channel:'Web Form', anon:true, category:'Corruption / Bribery', dept:'Supply Chain', entity:'Distribution Hub — North', stage:'Review', severity:'Critical', handler:'A. Krishnan (Ethics Office)', opened:daysAgo(29), sla:30, outcome:null, retaliationRisk:'Medium', forum:'Ethics', desc:'Alleged kickback arrangement with a freight-forwarding partner.', related:[]},
  {id:'WB-2026-0940', channel:'Email', anon:false, category:'Code of Conduct', dept:'Sales & Marketing', entity:'EMEA Regional Office', stage:'Triage', severity:'Low', handler:null, opened:daysAgo(4), sla:30, outcome:null, retaliationRisk:'Low', forum:null, desc:'Expense claims for client entertainment appear to exceed policy limits.', related:[]},
  {id:'WB-2026-0812', channel:'Web Form', anon:true, category:'Retaliation', dept:'Finance', entity:'Corporate HQ', stage:'Closed', severity:'High', handler:'L. D\'Souza (Legal)', opened:daysAgo(80), sla:21, outcome:'Unsubstantiated', retaliationRisk:'Medium', forum:'Ethics', desc:'Complainant from WB-2026-0790 alleges reduced responsibilities post-report.', related:['WB-2026-0790']},
  {id:'WB-2026-0899', channel:'Mobile App', anon:true, category:'Procurement Irregularity', dept:'Procurement', entity:'Plant — Chennai', stage:'Investigation', severity:'Medium', handler:'S. Fernandes (Internal Audit)', opened:daysAgo(21), sla:30, outcome:null, retaliationRisk:'Low', forum:'Ethics', desc:'Split purchase orders suspected to avoid approval thresholds.', related:[]},
  {id:'WB-2026-0945', channel:'Hotline (Call)', anon:false, category:'Workplace Harassment', dept:'Operations', entity:'Plant — Pune', stage:'Intake', severity:'High', handler:null, opened:daysAgo(1), sla:21, outcome:null, retaliationRisk:'Medium', forum:null, desc:'Verbal intimidation reported between two shift supervisors.', related:[]}
];

CASES.forEach(c=>{ c.age = daysBetween(c.opened, new Date()); c.overdue = c.stage!=='Closed' && c.age > c.sla; });

/* ---- Access / confidentiality log ---- */
const ACCESS_LOG = [
  {who:'S. Fernandes (Internal Audit)', case:'WB-2026-0871', action:'Viewed case file', when:daysAgo(0)},
  {who:'A. Krishnan (Ethics Office)', case:'WB-2026-0888', action:'Added investigator note', when:daysAgo(1)},
  {who:'R. Mehta (HR Compliance)', case:'WB-2026-0902', action:'Downloaded evidence bundle', when:daysAgo(1)},
  {who:'System', case:'WB-2026-0918', action:'Auto-restricted: pending conflict check', when:daysAgo(2)},
  {who:'L. D\'Souza (Legal)', case:'WB-2026-0925', action:'Granted view access to N. Iyer', when:daysAgo(3)},
  {who:'N. Iyer (Independent Counsel)', case:'WB-2026-0860', action:'Closed case, archived file', when:daysAgo(9)}
];

/* ---- Feedback / closure communications ---- */
const FEEDBACK_LOG = {
  'WB-2026-0790':[
    {when:daysAgo(100),what:'Acknowledgement sent to complainant via secure inbox.'},
    {when:daysAgo(60),what:'Interim update: investigation ongoing, no timeline change.'},

/* ---- Disciplinary actions ---- */
const DISCIPLINARY = [
  {id:uid('DA'), case:'WB-2026-0790', employee:'Vendor Mgmt Lead (Finance)', action:'Termination for cause', status:'Completed', date:daysAgo(12)},
  {id:uid('DA'), case:'WB-2026-0860', employee:'Shift Supervisor (Plant — Pune)', action:'Written warning + retraining', status:'Completed', date:daysAgo(18)},
  {id:uid('DA'), case:'WB-2026-0902', employee:'Reporting Manager (Sales)', action:'Suspension pending HR review', status:'In progress', date:daysAgo(5)}
];

/* ---- Ethics survey ---- */
const SURVEYS = [
  {name:'Annual Speak-Up Climate Survey 2026', period:'Q2 2026', responses:1284, eligible:1610, comfortReporting:71, awarenessOfChannel:88, fearOfRetaliation:19, status:'Closed'},
  {name:'New-Hire Ethics Orientation Pulse', period:'Q2 2026', responses:212, eligible:240, comfortReporting:64, awarenessOfChannel:95, fearOfRetaliation:14, status:'Closed'},
  {name:'Post-Case Trust Check-in — Finance', period:'Q3 2026', responses:58, eligible:140, comfortReporting:0, awarenessOfChannel:0, fearOfRetaliation:0, status:'Open'}

/* ---------- 16. Dashboard (Shell) — numeric KPI cards only, no charts ---------- */
RENDERERS.dashboard = function(){
  const open = CASES.filter(c=>c.stage!=='Closed');
  const overdue = CASES.filter(c=>c.overdue);
  const closed = CASES.filter(c=>c.stage==='Closed');
  const avgTAT = Math.round(closed.reduce((s,c)=>s+c.age,0)/(closed.length||1));
  const substantiated = closed.filter(c=>c.outcome==='Substantiated'||c.outcome==='Partially Substantiated').length;
  const subRate = closed.length? Math.round(substantiated/closed.length*100):0;
  const coverage = Math.round(SCOPE_UNITS.length/ENTITIES.length*100);
  const critOpen = open.filter(c=>c.severity==='Critical').length;
  const riskScore = Math.min(100, Math.round(critOpen*14 + overdue.length*9 + open.length*2));

  const wrap = el('<div></div>');
  wrap.appendChild(el(
    '<div class="stat-grid">'+
      statCard('Composite Risk Score', riskScore+' / 100', riskScore>55?'up-bad':(riskScore>30?'flat':'up-good'), riskScore>55?'Elevated — driven by open critical cases':'Within tolerance')+
      statCard('Open Cases', open.length, 'flat', overdue.length+' currently past SLA')+
      statCard('Overdue (Past SLA)', overdue.length, overdue.length>0?'up-bad':'up-good', overdue.length>0?'Requires escalation':'None outstanding')+
      statCard('Avg. Time to Close', avgTAT+' days', avgTAT>30?'up-bad':'up-good', 'Across '+closed.length+' closed cases')+
      statCard('Substantiation Rate', subRate+'%', 'flat', substantiated+' of '+closed.length+' closed cases founded')+
      statCard('Audit Universe Coverage', coverage+'%', coverage>=80?'up-good':'flat', SCOPE_UNITS.length+' of '+ENTITIES.length+' entities scoped')+
    '</div>'
  ));

  const byStagePanel = el('<div class="panel"></div>');
  byStagePanel.appendChild(el('<div class="panel-head"><div><div class="panel-title">Caseload by Stage</div><div class="panel-desc">Distribution of all cases currently in the pipeline</div></div></div>'));
  const pbody = el('<div class="panel-body"></div>');
  STAGES.forEach(st=>{
    const n = caseByStage(st).length;
    const pct = Math.round(n/CASES.length*100);
    pbody.appendChild(el(
      '<div style="margin-bottom:12px;">'+
        '<div style="display:flex; justify-content:space-between; font-size:12.5px; margin-bottom:5px;"><span style="font-weight:600;">'+st+'</span><span style="color:var(--slate);">'+n+' cases · '+pct+'%</span></div>'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%; background:'+stageColor(st)+';"></div></div>'+
      '</div>'
    ));
  });
  byStagePanel.appendChild(pbody);
  wrap.appendChild(byStagePanel);

  const openTablePanel = panelTable('Open Cases Requiring Attention','Sorted by severity, most urgent first',
    ['Case ID','Category','Department','Stage','Severity','Age / SLA','Handler'],
    open.sort((a,b)=>sevRank(b.severity)-sevRank(a.severity)).map(c=>[
      '<span class="id-cell">'+c.id+'</span>', c.category, c.dept, stageBadge(c.stage), severityBadge(c.severity),
      '<span class="'+(c.overdue?'mono':'mono')+'" style="color:'+(c.overdue?'var(--red)':'var(--ink-soft)')+';">'+c.age+'d / '+c.sla+'d'+(c.overdue?' ⚠':'')+'</span>',
      c.handler||'<span style="color:var(--slate);">Unassigned</span>'
    ])
  );
  wrap.appendChild(openTablePanel);
  return wrap;
};
function sevRank(s){ return {Critical:4,High:3,Medium:2,Low:1}[s]||0; }
function stageColor(st){ return {Intake:'#9AA7BD',Triage:'#8C7FC2',Investigation:'#C99A4A',Review:'#3F9C8E',Closed:'#0F6E63'}[st]; }
function statCard(label,num,cls,delta){
  return '<div class="stat-card"><div class="stat-num">'+num+'</div><div class="stat-label">'+label+'</div><div class="stat-delta '+cls+'">'+delta+'</div></div>';
}
function panelTable(title,desc,headers,rows,emptyMsg){
  const p = el('<div class="panel"></div>');
  p.appendChild(el('<div class="panel-head"><div><div class="panel-title">'+title+'</div>'+(desc?'<div class="panel-desc">'+desc+'</div>':'')+'</div></div>'));
  if(!rows.length){ p.appendChild(el('<div class="empty">'+(emptyMsg||'No records yet.')+'</div>')); return p; }
  const body = el('<div class="panel-body" style="padding:0; overflow-x:auto;"></div>');
  let html = '<table><thead><tr>'+headers.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>';
  rows.forEach(r=>{ html += '<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>'; });
  html += '</tbody></table>';
  body.innerHTML = html;
  p.appendChild(body);
  return p;
}

    ])
  ));
  if(!unassigned.length) return wrap;
  wrap.appendChild(panelTable('Currently Assigned','Active caseload by handler', ['Handler','Open Cases','Case IDs'],
    HANDLERS.map(h=>{
      const cs = CASES.filter(c=>c.handler===h && c.stage!=='Closed');
      return [h, cs.length, cs.map(c=>c.id).join(', ')||'<span style="color:var(--slate);">—</span>'];
    })
  ));
  setTimeout(()=>{
    document.querySelectorAll('[data-field="handler"]').forEach(sel=>{
      sel.addEventListener('change',()=>{
        if(sel.value==='— Select handler —') return;
        const chk = document.querySelector('[data-conflict="'+sel.dataset.case+'"]');
        if(!chk.checked){ showToast('Complete the conflict-of-interest check first.'); sel.value=''; return; }
        const c = findCase(sel.dataset.case); c.handler=sel.value; if(c.stage==='Intake') c.stage='Triage';
        showToast(sel.dataset.case+' assigned to '+sel.value+'.'); go('assignment');
      });
    });
  },0);
  return wrap;
};

/* ---------- 6. SLA & Ageing Monitor ---------- */
RENDERERS.sla = function(){
  const wrap = el('<div></div>');
  const open = CASES.filter(c=>c.stage!=='Closed');
  const overdue = open.filter(c=>c.overdue);
  const nearing = open.filter(c=>!c.overdue && c.age/c.sla>=0.75);
  wrap.appendChild(el('<div class="stat-grid">'+
    statCard('Past SLA', overdue.length, overdue.length>0?'up-bad':'up-good','Escalation required')+
    statCard('Nearing SLA (≥75%)', nearing.length,'flat','Watch list')+
    statCard('On Track', open.length-overdue.length-nearing.length,'up-good','Within normal ageing')+
  '</div>'));
  wrap.appendChild(panelTable('Ageing Detail','Sorted by percentage of SLA consumed, most urgent first',
    ['Case ID','Stage','Opened','Age','SLA Target','SLA Consumed'],
    open.sort((a,b)=>(b.age/b.sla)-(a.age/a.sla)).map(c=>{
      const pct=Math.min(140,Math.round(c.age/c.sla*100));
      const color = pct>=100?'var(--red)':(pct>=75?'var(--amber)':'var(--teal)');
      return [ '<span class="id-cell">'+c.id+'</span>', stageBadge(c.stage), fmtDate(c.opened), c.age+' days', c.sla+' days',
        '<div style="min-width:140px;"><div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,pct)+'%; background:'+color+';"></div></div>'+
        '<div style="font-size:10.5px; margin-top:3px; color:'+color+'; font-weight:600;">'+pct+'%'+(pct>=100?' overdue':'')+'</div></div>' ];
    })
  ));
  return wrap;
};

RENDERERS.investigation = function(){

function openCaseDetail(id){
  const c = findCase(id);
  const body =
    '<div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;">'+stageBadge(c.stage)+severityBadge(c.severity)+riskBadge(c.retaliationRisk)+outcomeBadge(c.outcome)+'</div>'+
    '<div class="field"><label>Category / Department</label><div style="font-size:13px;">'+c.category+' — '+c.dept+' ('+c.entity+')</div></div>'+
    '<div class="field"><label>Description</label><div style="font-size:13px;">'+c.desc+'</div></div>'+
    '<div class="form-grid">'+
      '<div class="field"><label>Handler</label><div style="font-size:13px;">'+(c.handler||'Unassigned')+'</div></div>'+
      '<div class="field"><label>Opened / Age</label><div style="font-size:13px;">'+fmtDate(c.opened)+' · '+c.age+' days</div></div>'+
    '</div>'+
    (c.related.length ? '<div class="field"><label>Related Cases</label><div style="font-size:13px;">'+c.related.join(', ')+'</div></div>' : '')+
    '<div class="field"><label>Advance Stage</label>'+selectInline(c.id,'stage',STAGES,c.stage)+'</div>';
  openModal(c.id, body, '<button class="btn btn-ghost" onclick="closeModal()">Close</button>');
  setTimeout(()=>{
    document.querySelectorAll('[data-field="stage"]').forEach(sel=>{
      sel.addEventListener('change',()=>{
        findCase(sel.dataset.case).stage = sel.value;
        closeModal(); showToast(sel.dataset.case+' moved to '+sel.value+'.'); go('investigation');
      });
    });
  },0);
}

  headPanel.appendChild(el('<div class="panel-head"><div><div class="panel-title">Build a New Sample</div><div class="panel-desc">Draw a statistical or judgemental sample from a defined population</div></div></div>'));
  headPanel.appendChild(el(
    '<div class="panel-body"><div class="form-grid">'+
      '<div class="field"><label>Population</label><input type="text" id="sp_pop" placeholder="e.g. Closed cases FY2026"></div>'+
      '<div class="field"><label>Population Size</label><input type="number" id="sp_size" placeholder="e.g. 40"></div>'+
      '<div class="field"><label>Method</label><select id="sp_method"><option>Statistical (95% CI, 5% precision)</option><option>Judgemental — full population</option><option>Judgemental — risk-weighted</option></select></div>'+
      '<div class="field"><label>Sample Size</label><input type="number" id="sp_sample" placeholder="e.g. 25"></div>'+
    '</div><button class="btn btn-teal" id="drawSampleBtn">Draw Sample</button></div>'
  ));
  wrap.appendChild(headPanel);
  wrap.appendChild(panelTable('Sample History','', ['Sample','Population Size','Method','Sample Size','Drawn On'],
    SAMPLES.map(s=>[s.name, s.population, s.method, s.sampleSize, fmtDate(s.drawnOn)])
  ));
  setTimeout(()=>{
    document.getElementById('drawSampleBtn').addEventListener('click',()=>{
      const pop = document.getElementById('sp_pop').value.trim() || 'Untitled population';
      SAMPLES.unshift({name:pop, population:Number(document.getElementById('sp_size').value)||0, method:document.getElementById('sp_method').value,
        sampleSize:Number(document.getElementById('sp_sample').value)||0, drawnOn:new Date()});
      showToast('Sample drawn for "'+pop+'".'); go('sampling');
    });
  },0);
  return wrap;
};

/* ---------- 22. Exception & Red-Flag Queue ---------- */
RENDERERS.exceptions = function(){
  const wrap = el('<div></div>');
  wrap.appendChild(el('<div class="stat-grid">'+
    statCard('Open Exceptions', EXCEPTIONS.filter(e=>e.disposition==='Under review'||e.disposition==='Monitoring').length,'up-bad','')+
    statCard('Escalated to a Case', EXCEPTIONS.filter(e=>String(e.disposition).startsWith('Escalated')).length,'flat','')+
    statCard('Cleared', EXCEPTIONS.filter(e=>e.disposition.includes('cleared')).length,'up-good','')+
  '</div>'));
  wrap.appendChild(panelTable('Exception Queue','System-generated red flags awaiting triage and disposition',
    ['Flagged','Rule Triggered','Reference','Detail','Disposition'],
    [...EXCEPTIONS].sort((a,b)=>b.flaggedOn-a.flaggedOn).map(e=>[fmtDate(e.flaggedOn), e.rule, '<span class="id-cell">'+e.ref+'</span>', e.detail, statusBadge(e.disposition)])
  ));
  return wrap;
};

/* ---------- 23. Working Papers & Evidence ---------- */
RENDERERS.workpapers = function(){
  const wrap = el('<div></div>');
  wrap.appendChild(el('<div class="stat-grid">'+
    statCard('Working Papers Logged', WORKPAPERS.length,'flat','')+
    statCard('Pending Sign-off', WORKPAPERS.filter(w=>w.signOff==='Pending').length, WORKPAPERS.filter(w=>w.signOff==='Pending').length>0?'up-bad':'up-good','')+
  '</div>'));
  wrap.appendChild(panelTable('Working Papers & Evidence','Attached evidence, tick-marks and reviewer sign-off per case',
    ['Reference','Case ID','Title','Preparer','Reviewer','Sign-off','Updated'],
    WORKPAPERS.map(w=>['<span class="id-cell">'+w.ref+'</span>', '<span class="id-cell">'+w.case+'</span>', w.title, w.preparer, w.reviewer, statusBadge(w.signOff), fmtDate(w.updated)])
  ));
  return wrap;
};

/* ---------- 24. Observation & Finding Log ---------- */
RENDERERS.findings = function(){
  const wrap = el('<div></div>');
  wrap.appendChild(el('<div class="stat-grid">'+
    statCard('Findings Raised', FINDINGS.length,'flat','')+
    statCard('Open / In Remediation', FINDINGS.filter(f=>f.status==='Open'||f.status==='In remediation').length,'flat','')+
    statCard('Critical / High Grade', FINDINGS.filter(f=>f.grade==='Critical'||f.grade==='High').length,'flat','')+
  '</div>'));
  wrap.appendChild(panelTable('Findings Log','Observations raised, graded and routed to the accountable owner',
    ['Case ID','Finding','Grade','Routed To','Status','Raised'],
    FINDINGS.map(f=>['<span class="id-cell">'+f.case+'</span>', f.title, severityBadge(f.grade), f.route, statusBadge(f.status), fmtDate(f.raised)])
  ));
  return wrap;
};

/* ---------- 25. Remediation / Action Tracker ---------- */
RENDERERS.remediation = function(){
  const wrap = el('<div></div>');
  wrap.appendChild(el('<div class="stat-grid">'+
    statCard('CAPA Items', REMEDIATION.length,'flat','')+
    statCard('Completed', REMEDIATION.filter(r=>r.status==='Completed').length,'up-good','')+
    statCard('Overdue', REMEDIATION.filter(r=>r.status!=='Completed' && r.due<new Date()).length, REMEDIATION.filter(r=>r.status!=='Completed' && r.due<new Date()).length>0?'up-bad':'up-good','')+
  '</div>'));
  wrap.appendChild(panelTable('Remediation Tracker','Corrective and preventive action items tied to logged findings',
    ['Finding','Owner','Action','Due','Status'],
    REMEDIATION.map(r=>[r.finding, r.owner, r.action, fmtDate(r.due), statusBadge(r.status)])
  ));
  return wrap;
};

/* ============================= init ============================= */
render();
</script>
</body>
